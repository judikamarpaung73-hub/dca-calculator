<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator DCA Portofolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 650px;
            overflow-x: auto;
        }
        h2 {
            text-align: center;
            color: #1a4a38;
            margin-top: 0;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            font-size: 13px;
            color: #7f8c8d;
            margin-bottom: 25px;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        input[type="text"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="text"]:focus {
            border-color: #1a4a38;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            white-space: nowrap;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }
        th {
            background-color: #1a4a38;
            color: white;
            font-weight: bold;
        }
        /* Efek Hover untuk baris yang bisa diklik */
        .clickable-row {
            cursor: pointer;
            transition: background-color 0.2s ease;
        }
        .clickable-row:hover {
            background-color: #e9f2ee;
        }
        .clickable-row td:first-child {
            color: #1a4a38;
            font-weight: bold;
            text-decoration: underline;
            text-decoration-style: dotted;
        }
        tr:last-child td {
            font-weight: bold;
            border-top: 2px solid #1a4a38;
            border-bottom: none;
            background-color: #f8fbf9;
            cursor: default;
        }
        .text-right { text-align: right; }
        .text-center { text-align: center; }

        /* CSS untuk Pop-up Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            z-index: 10;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0,0,0,0.5);
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(2px);
        }
        .modal-content {
            background-color: #fff;
            padding: 25px;
            border-radius: 12px;
            width: 85%;
            max-width: 400px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            position: relative;
            animation: fadeIn 0.2s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            font-size: 24px;
            font-weight: bold;
            color: #bdc3c7;
            cursor: pointer;
            transition: color 0.2s;
        }
        .close-btn:hover { color: #e74c3c; }
        .modal-title {
            color: #1a4a38;
            margin-top: 0;
            margin-bottom: 10px;
            font-size: 20px;
            border-bottom: 2px solid #ecf0f1;
            padding-bottom: 10px;
        }
        .modal-desc {
            font-size: 14px;
            line-height: 1.5;
            color: #34495e;
            margin-bottom: 20px;
        }
        .modal-stats {
            background-color: #f8fbf9;
            border: 1px solid #dce8e2;
            border-radius: 8px;
            padding: 15px;
        }
        .stat-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 8px;
            font-size: 14px;
        }
        .stat-row:last-child { margin-bottom: 0; }
        .stat-label { font-weight: bold; color: #2c3e50; }
        .stat-value { color: #27ae60; font-weight: bold; }

    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator Alokasi DCA</h2>
    <div class="subtitle">Ketuk nama aset di tabel untuk melihat detail fundamental</div>
    
    <div class="input-group">
        <label for="modal">Total Modal Investasi (Rp):</label>
        <input type="text" id="modal" placeholder="Ketik nominal, misal: 1.000.000" oninput="formatInput(this)">
    </div>

    <table>
        <thead>
            <tr>
                <th>Aset</th>
                <th class="text-center">Porsi</th>
                <th class="text-right">Alokasi Dana</th>
            </tr>
        </thead>
        <tbody>
            <tr class="clickable-row" onclick="openModal('voo')">
                <td>VOO</td>
                <td class="text-center">55%</td>
                <td class="text-right" id="val-voo">Rp 0</td>
            </tr>
            <tr class="clickable-row" onclick="openModal('vgt')">
                <td>VGT</td>
                <td class="text-center">15%</td>
                <td class="text-right" id="val-vgt">Rp 0</td>
            </tr>
            <tr class="clickable-row" onclick="openModal('bbca')">
                <td>BBCA</td>
                <td class="text-center">15%</td>
                <td class="text-right" id="val-bbca">Rp 0</td>
            </tr>
            <tr class="clickable-row" onclick="openModal('vxus')">
                <td>VXUS</td>
                <td class="text-center">10%</td>
                <td class="text-right" id="val-vxus">Rp 0</td>
            </tr>
            <tr class="clickable-row" onclick="openModal('btc')">
                <td>BTC</td>
                <td class="text-center">5%</td>
                <td class="text-right" id="val-btc">Rp 0</td>
            </tr>
            <tr>
                <td><strong>TOTAL</strong></td>
                <td class="text-center"><strong>100%</strong></td>
                <td class="text-right" id="val-total">Rp 0</td>
            </tr>
        </tbody>
    </table>
</div>

<div id="infoModal" class="modal-overlay" onclick="closeOutside(event)">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">&times;</span>
        <h3 id="modal-name" class="modal-title">Nama Aset</h3>
        <div id="modal-desc" class="modal-desc">Deskripsi aset...</div>
        <div class="modal-stats">
            <div class="stat-row">
                <span class="stat-label">Pertumbuhan (CAGR):</span>
                <span id="modal-cagr" class="stat-value">0% / thn</span>
            </div>
            <div class="stat-row">
                <span class="stat-label">Dividen (Yield):</span>
                <span id="modal-div" class="stat-value">0% / thn</span>
            </div>
        </div>
    </div>
</div>

<script>
    // Database Fundamental Aset
    const dbAset = {
        voo: {
            name: "VOO (Vanguard S&P 500 ETF)",
            desc: "Keranjang investasi yang melacak 500 perusahaan terbesar dan paling menguntungkan di Amerika Serikat (Apple, Microsoft, Amazon, dll). Berfungsi sebagai fondasi utama portofolio untuk menangkap laju ekonomi global dengan risiko terukur.",
            cagr: "12.0% / thn",
            div: "1.4% / thn"
        },
        vgt: {
            name: "VGT (Vanguard Info Tech ETF)",
            desc: "Fokus eksklusif pada sektor teknologi murni (Software, Cloud, Cybersecurity, Hardware). Menawarkan potensi lonjakan pertumbuhan modal yang agresif, namun dengan tingkat volatilitas yang lebih tajam saat pasar terkoreksi.",
            cagr: "19.0% / thn",
            div: "0.8% / thn"
        },
        bbca: {
            name: "BBCA (PT Bank Central Asia Tbk)",
            desc: "Bank swasta terbesar di Indonesia dengan infrastruktur digital terkuat dan dana murah (CASA) terbesar. Bertindak sebagai 'jangkar lokal' yang memberikan stabilitas, pertumbuhan konsisten, dan efisiensi pajak dari dividen domestik.",
            cagr: "13.0% / thn",
            div: "2.8% / thn"
        },
        vxus: {
            name: "VXUS (Vanguard Total Intl ETF)",
            desc: "Mencakup ribuan perusahaan di seluruh dunia di luar Amerika Serikat (Eropa, Asia Pasifik, Pasar Berkembang). Berfungsi sebagai instrumen diversifikasi geografis jika ekonomi AS sedang mengalami stagnasi.",
            cagr: "5.0% / thn",
            div: "3.0% / thn"
        },
        btc: {
            name: "BTC (Bitcoin)",
            desc: "Aset digital terdesentralisasi dengan suplai absolut yang terbatas. Berfungsi sebagai instrumen berisiko tinggi (High Risk, High Reward) dan pelindung nilai terhadap pencetakan uang tunai (inflasi fiat) yang berlebihan.",
            cagr: "45.0% / thn",
            div: "0.0% / thn"
        }
    };

    // Fungsi Logika Modal
    function openModal(asetKey) {
        const data = dbAset[asetKey];
        document.getElementById("modal-name").innerText = data.name;
        document.getElementById("modal-desc").innerText = data.desc;
        document.getElementById("modal-cagr").innerText = data.cagr;
        document.getElementById("modal-div").innerText = data.div;
        
        document.getElementById("infoModal").style.display = "flex";
    }

    function closeModal() {
        document.getElementById("infoModal").style.display = "none";
    }

    function closeOutside(event) {
        const modal = document.getElementById("infoModal");
        if (event.target === modal) {
            closeModal();
        }
    }

    // Fungsi Logika Kalkulator
    function formatInput(inputElement) {
        let rawValue = inputElement.value.replace(/[^0-9]/g, '');
        if (rawValue !== '') {
            inputElement.value = parseInt(rawValue, 10).toLocaleString('id-ID');
        } else {
            inputElement.value = '';
        }
        hitungAlokasi(rawValue);
    }

    function hitungAlokasi(rawValue) {
        let modal = parseFloat(rawValue);
        if (isNaN(modal) || modal < 0) { modal = 0; }

        const porsi = { voo: 0.55, vgt: 0.15, bbca: 0.15, vxus: 0.10, btc: 0.05 };

        let danaVOO = modal * porsi.voo;
        let danaVGT = modal * porsi.vgt;
        let danaBBCA = modal * porsi.bbca;
        let danaVXUS = modal * porsi.vxus;
        let danaBTC = modal * porsi.btc;

        const formatRupiah = new Intl.NumberFormat('id-ID', {
            style: 'currency', currency: 'IDR', minimumFractionDigits: 0, maximumFractionDigits: 0
        });

        document.getElementById("val-voo").innerText = formatRupiah.format(danaVOO);
        document.getElementById("val-vgt").innerText = formatRupiah.format(danaVGT);
        document.getElementById("val-bbca").innerText = formatRupiah.format(danaBBCA);
        document.getElementById("val-vxus").innerText = formatRupiah.format(danaVXUS);
        document.getElementById("val-btc").innerText = formatRupiah.format(danaBTC);
        document.getElementById("val-total").innerText = formatRupiah.format(modal);
    }
</script>

</body>
</html>
