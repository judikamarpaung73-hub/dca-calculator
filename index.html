<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kalkulator DCA Portofolio</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            background-color: #fff;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 450px;
        }
        h2 {
            text-align: center;
            color: #1a4a38;
            margin-top: 0;
        }
        .input-group {
            margin-bottom: 25px;
        }
        label {
            display: block;
            font-weight: bold;
            margin-bottom: 8px;
            color: #2c3e50;
        }
        input[type="number"] {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #bdc3c7;
            border-radius: 8px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.3s;
        }
        input[type="number"]:focus {
            border-color: #1a4a38;
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th, td {
            padding: 12px;
            text-align: left;
            border-bottom: 1px solid #ecf0f1;
        }
        th {
            background-color: #1a4a38;
            color: white;
            font-weight: bold;
        }
        tr:last-child td {
            font-weight: bold;
            border-top: 2px solid #1a4a38;
            border-bottom: none;
        }
        .text-right {
            text-align: right;
        }
        .text-center {
            text-align: center;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Kalkulator Alokasi DCA</h2>
    
    <div class="input-group">
        <label for="modal">Total Modal Investasi (Rp):</label>
        <input type="number" id="modal" placeholder="Ketik nominal, misal: 1000000" oninput="hitungAlokasi()">
    </div>

    <table>
        <thead>
            <tr>
                <th>Aset</th>
                <th class="text-center">Porsi</th>
                <th class="text-right">Alokasi Dana</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>VTI</td>
                <td class="text-center">55%</td>
                <td class="text-right" id="val-vti">Rp 0</td>
            </tr>
            <tr>
                <td>VGT</td>
                <td class="text-center">15%</td>
                <td class="text-right" id="val-vgt">Rp 0</td>
            </tr>
            <tr>
                <td>BBCA</td>
                <td class="text-center">15%</td>
                <td class="text-right" id="val-bbca">Rp 0</td>
            </tr>
            <tr>
                <td>VXUS</td>
                <td class="text-center">10%</td>
                <td class="text-right" id="val-vxus">Rp 0</td>
            </tr>
            <tr>
                <td>BTC</td>
                <td class="text-center">5%</td>
                <td class="text-right" id="val-btc">Rp 0</td>
            </tr>
            <tr>
                <td><strong>Total</strong></td>
                <td class="text-center"><strong>100%</strong></td>
                <td class="text-right" id="val-total">Rp 0</td>
            </tr>
        </tbody>
    </table>
</div>

<script>
    function hitungAlokasi() {
        let modalInput = document.getElementById("modal").value;
        let modal = parseFloat(modalInput);

        if (isNaN(modal) || modal < 0) {
            modal = 0;
        }

        const porsi = {
            vti: 0.55,
            vgt: 0.15,
            bbca: 0.15,
            vxus: 0.10,
            btc: 0.05
        };

        let danaVTI = modal * porsi.vti;
        let danaVGT = modal * porsi.vgt;
        let danaBBCA = modal * porsi.bbca;
        let danaVXUS = modal * porsi.vxus;
        let danaBTC = modal * porsi.btc;

        const formatRupiah = new Intl.NumberFormat('id-ID', {
            style: 'currency',
            currency: 'IDR',
            minimumFractionDigits: 0,
            maximumFractionDigits: 0
        });

        document.getElementById("val-vti").innerText = formatRupiah.format(danaVTI);
        document.getElementById("val-vgt").innerText = formatRupiah.format(danaVGT);
        document.getElementById("val-bbca").innerText = formatRupiah.format(danaBBCA);
        document.getElementById("val-vxus").innerText = formatRupiah.format(danaVXUS);
        document.getElementById("val-btc").innerText = formatRupiah.format(danaBTC);
        document.getElementById("val-total").innerText = formatRupiah.format(modal);
    }
</script>

</body>
</html>
